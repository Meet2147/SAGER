[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "docflow-sager"
version = "0.1.1"
description = "Document-native DAG runner for preprocessing PDFs, Office files, and email messages into structured evidence artifacts."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "pydantic>=2.7,<3",
  "networkx>=3.3,<4",
  "numpy>=1.26,<3",
  "scikit-learn>=1.5,<2",
  "jinja2>=3.1,<4",
  "pypdf>=5,<6",
  "PyYAML>=6,<7",
  "openpyxl>=3.1,<4",
  "xlrd>=2,<3",
  "olefile>=0.47,<1",
  "extract-msg>=0.41,<1",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.2,<9",
]

[project.scripts]
docflow = "docflow.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
include = ["docflow*"]
